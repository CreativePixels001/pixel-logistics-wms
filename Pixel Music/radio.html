<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Radio</title>
    
    <link rel="icon" type="image/svg+xml" href="PixelPlayLogo-White.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Pixel Radio Styles -->
    <link rel="stylesheet" href="radio.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <img src="PixelPlayLogo-White.svg" alt="Pixel Radio" class="header-logo">
            <div class="brand">Pixel Radio</div>
        </div>
        <div class="header-search">
            <input type="text" id="searchInput" placeholder="Search stations...">
        </div>
        <a href="index.html" class="profile-btn" title="Back to Pixel Play"><i class="bi bi-music-note-beamed"></i></a>
    </header>

    <div class="loading-text" id="loadingText">Loading India...</div>

    <!-- City Map View -->
    <main class="main city-view" id="cityView">
        <div class="location-bar" id="locationBar">
            <i class="bi bi-crosshair"></i>
            <span id="userLocation">Detecting your location...</span>
        </div>
        
        <div class="state-filter" id="stateFilter">
            <button class="state-chip active" data-state="all">All India</button>
            <button class="state-chip" data-state="nearby">📍 Nearby</button>
        </div>
        
        <div class="city-grid" id="cityGrid">
            <!-- City bubbles will be added here -->
        </div>
    </main>

    <!-- Player -->
    <div class="player">
        <div class="player-info">
            <div class="player-icon" id="playerIcon">
                <div class="radio-wave"></div>
                <div class="radio-wave"></div>
                <div class="radio-wave"></div>
            </div>
            <div class="player-text">
                <div class="now-playing" id="nowPlaying">Select a station</div>
                <div class="now-location" id="nowLocation">Click any box to play</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" id="prevBtn" title="Previous"><i class="bi bi-skip-start-fill"></i></button>
            <button class="ctrl-btn ctrl-btn-main" id="playPauseBtn" title="Play/Stop"><i class="bi bi-stop-fill"></i></button>
            <button class="ctrl-btn" id="nextBtn" title="Next"><i class="bi bi-skip-end-fill"></i></button>
            <button class="ctrl-btn" id="saveBtn" title="Save"><i class="bi bi-heart"></i></button>
            <button class="ctrl-btn" id="shareBtn" title="Share"><i class="bi bi-share"></i></button>
        </div>
    </div>

    <audio id="audio"></audio>

    <!-- Pixel Radio Logic -->
    <script src="radio.js"></script>
</body>
</html>
