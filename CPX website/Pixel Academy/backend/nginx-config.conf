#!/bin/bash

# ===========================================
# Nginx Configuration for Pixel Academy
# Save to: /etc/nginx/sites-available/pixel-academy
# ===========================================

# Replace YOUR_DOMAIN with your actual domain
# If no domain, use your EC2 public IP

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    
    # Or use EC2 IP if no domain:
    # server_name ec2-xx-xx-xx-xx.ap-south-1.compute.amazonaws.com;

    # Redirect HTTP to HTTPS (after SSL setup)
    # return 301 https://$server_name$request_uri;

    # API Proxy
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (bypass auth)
    location /health {
        proxy_pass http://localhost:8080/health;
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/pixel-academy-access.log;
    error_log /var/log/nginx/pixel-academy-error.log;
}

