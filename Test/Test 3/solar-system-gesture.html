<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture-Controlled Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #video {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid #00ffff;
            border-radius: 10px;
            transform: scaleX(-1);
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        #planet-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8),
                         0 0 60px rgba(0, 255, 255, 0.6);
            pointer-events: none;
            z-index: 5;
            letter-spacing: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        #gesture-guide {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(20, 20, 40, 0.85);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 20px 30px;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        #gesture-guide h3 {
            margin-bottom: 15px;
            color: #00ffff;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .gesture-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 16px;
        }

        .gesture-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gesture-text {
            color: #fff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #00ffff;
            z-index: 100;
        }

        .hidden {
            display: none;
        }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 40, 0.85);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 10px 20px;
            z-index: 10;
            font-size: 14px;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div id="loading">Initializing Solar System...</div>
    <div id="status">Camera: Loading...</div>
    <div id="canvas-container"></div>
    <video id="video" autoplay playsinline></video>
    <div id="planet-label">EARTH</div>
    
    <div id="gesture-guide">
        <h3>🎮 Gesture Controls</h3>
        <div class="gesture-item">
            <div class="gesture-icon">🖐️</div>
            <div class="gesture-text">Open Hand: Next Planet</div>
        </div>
        <div class="gesture-item">
            <div class="gesture-icon">✊</div>
            <div class="gesture-text">Closed Fist: Zoom & Fast Spin</div>
        </div>
        <div class="gesture-item">
            <div class="gesture-icon">✌️</div>
            <div class="gesture-text">Peace Sign: Reset Zoom</div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // ==================== THREE.JS SETUP ====================
        let scene, camera, renderer;
        let sun, planets = [];
        let currentPlanetIndex = 0;
        let isZoomed = false;
        let rotationSpeed = 1;
        let orbitSpeed = 1;
        const planetData = [
            { name: 'EARTH', color: 0x2233ff, size: 0.8, distance: 8, speed: 0.01 },
            { name: 'MARS', color: 0xff4422, size: 0.6, distance: 12, speed: 0.008 },
            { name: 'JUPITER', color: 0xffaa44, size: 1.5, distance: 18, speed: 0.005 },
            { name: 'SATURN', color: 0xffdd88, size: 1.2, distance: 24, speed: 0.004 }
        ];

        function initThreeJS() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 10, 20);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Starry background
            createStarfield();

            // Sun
            const sunGeometry = new THREE.SphereGeometry(2, 32, 32);
            const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);

            // Sun light
            const sunLight = new THREE.PointLight(0xffffff, 2, 100);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);

            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            // Create planets
            planetData.forEach((data, index) => {
                const planetGeometry = new THREE.SphereGeometry(data.size, 32, 32);
                const planetMaterial = new THREE.MeshPhongMaterial({ 
                    color: data.color,
                    shininess: 30
                });
                const planet = new THREE.Mesh(planetGeometry, planetMaterial);
                
                planet.userData = {
                    name: data.name,
                    distance: data.distance,
                    angle: (Math.PI * 2 / planetData.length) * index,
                    speed: data.speed,
                    originalSpeed: data.speed
                };
                
                planet.position.x = Math.cos(planet.userData.angle) * data.distance;
                planet.position.z = Math.sin(planet.userData.angle) * data.distance;
                
                scene.add(planet);
                planets.push(planet);

                // Add orbit ring
                const orbitGeometry = new THREE.RingGeometry(data.distance - 0.05, data.distance + 0.05, 64);
                const orbitMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0x444444, 
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.3
                });
                const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: 0.1 
            });

            const starsVertices = [];
            for (let i = 0; i < 10000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                starsVertices.push(x, y, z);
            }

            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateCameraPosition() {
            const currentPlanet = planets[currentPlanetIndex];
            const targetDistance = isZoomed ? 5 : 15;
            const targetPosition = new THREE.Vector3(
                currentPlanet.position.x,
                currentPlanet.position.y + targetDistance * 0.3,
                currentPlanet.position.z + targetDistance
            );

            camera.position.lerp(targetPosition, 0.05);
            camera.lookAt(currentPlanet.position);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Rotate sun
            sun.rotation.y += 0.005;

            // Update planets
            planets.forEach((planet, index) => {
                // Orbit
                planet.userData.angle += planet.userData.speed * orbitSpeed;
                planet.position.x = Math.cos(planet.userData.angle) * planet.userData.distance;
                planet.position.z = Math.sin(planet.userData.angle) * planet.userData.distance;
                
                // Rotation
                planet.rotation.y += 0.01 * rotationSpeed;
            });

            updateCameraPosition();
            renderer.render(scene, camera);
        }

        // ==================== GESTURE RECOGNITION ====================
        let lastGestureTime = 0;
        const gestureDelay = 800; // ms between gesture detections

        function initMediaPipe() {
            const videoElement = document.getElementById('video');
            
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults(onHandResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });

            camera.start();

            document.getElementById('status').textContent = 'Camera: Active ✓';
            document.getElementById('loading').classList.add('hidden');
        }

        function detectGesture(landmarks) {
            // Get finger tip and base positions
            const fingers = {
                thumb: landmarks[4],
                index: landmarks[8],
                middle: landmarks[12],
                ring: landmarks[16],
                pinky: landmarks[20]
            };

            const fingerBases = {
                thumb: landmarks[2],
                index: landmarks[6],
                middle: landmarks[10],
                ring: landmarks[14],
                pinky: landmarks[18]
            };

            // Calculate if fingers are extended
            const isExtended = {
                thumb: fingers.thumb.x < fingerBases.thumb.x - 0.05,
                index: fingers.index.y < fingerBases.index.y - 0.05,
                middle: fingers.middle.y < fingerBases.middle.y - 0.05,
                ring: fingers.ring.y < fingerBases.ring.y - 0.05,
                pinky: fingers.pinky.y < fingerBases.pinky.y - 0.05
            };

            // Gesture 1: Open Hand (all fingers extended)
            if (Object.values(isExtended).every(v => v)) {
                return 'OPEN_HAND';
            }

            // Gesture 2: Closed Fist (all fingers closed)
            if (Object.values(isExtended).every(v => !v)) {
                return 'CLOSED_FIST';
            }

            // Gesture 3: Peace Sign (index and middle extended, others closed)
            if (isExtended.index && isExtended.middle && 
                !isExtended.ring && !isExtended.pinky) {
                return 'PEACE_SIGN';
            }

            return 'UNKNOWN';
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const gesture = detectGesture(landmarks);
                
                const currentTime = Date.now();
                if (currentTime - lastGestureTime > gestureDelay) {
                    handleGesture(gesture);
                    lastGestureTime = currentTime;
                }
            }
        }

        function handleGesture(gesture) {
            switch(gesture) {
                case 'OPEN_HAND':
                    // Next planet
                    currentPlanetIndex = (currentPlanetIndex + 1) % planets.length;
                    updatePlanetLabel();
                    console.log('🖐️ Open Hand - Next Planet:', planetData[currentPlanetIndex].name);
                    break;

                case 'CLOSED_FIST':
                    // Zoom in and fast spin
                    if (!isZoomed) {
                        isZoomed = true;
                        rotationSpeed = 2;
                        console.log('✊ Closed Fist - Zoom & Fast Spin');
                    }
                    break;

                case 'PEACE_SIGN':
                    // Zoom out and normal speed
                    if (isZoomed) {
                        isZoomed = false;
                        rotationSpeed = 1;
                        console.log('✌️ Peace Sign - Reset Zoom');
                    }
                    break;
            }
        }

        function updatePlanetLabel() {
            const label = document.getElementById('planet-label');
            label.textContent = planetData[currentPlanetIndex].name;
            
            // Trigger animation
            label.style.animation = 'none';
            setTimeout(() => {
                label.style.animation = 'pulse 2s ease-in-out infinite';
            }, 10);
        }

        // ==================== INITIALIZATION ====================
        window.addEventListener('load', () => {
            initThreeJS();
            initMediaPipe();
            animate();
        });
    </script>
</body>
</html>
