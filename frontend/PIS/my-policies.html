<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Policies - Pixel Safe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f9fafb;
            min-height: 100vh;
        }
        
        .navbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: #000;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #6b7280;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover,
        .nav-links a.active {
            color: #000;
        }
        
        .page-header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #6b7280;
            font-size: 1.125rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }
        
        .stat-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
        }
        
        .policies-grid {
            display: grid;
            gap: 1.5rem;
        }
        
        .policy-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .policy-card:hover {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        .policy-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        
        .policy-info h3 {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .policy-number {
            font-size: 0.875rem;
            color: #6b7280;
            font-family: monospace;
        }
        
        .policy-status {
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-active {
            background: #dcfce7;
            color: #166534;
        }
        
        .status-expiring {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-expired {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .policy-body {
            padding: 1.5rem;
        }
        
        .policy-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .detail-label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .detail-value {
            font-size: 1rem;
            font-weight: 600;
            color: #000;
        }
        
        .expiry-alert {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .expiry-alert svg {
            flex-shrink: 0;
        }
        
        .renewal-offer {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        
        .renewal-offer h4 {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .offer-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }
        
        .original-price {
            text-decoration: line-through;
            opacity: 0.8;
            font-size: 1rem;
        }
        
        .offer-price {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .policy-actions {
            display: flex;
            gap: 1rem;
        }
        
        button {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #000;
            color: white;
        }
        
        .btn-primary:hover {
            background: #333;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }
        
        .empty-state svg {
            opacity: 0.3;
            margin-bottom: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .policy-details {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 640px) {
            .stats-grid,
            .policy-details {
                grid-template-columns: 1fr;
            }
            
            .policy-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span>Pixel Safe</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="my-policies.html" class="active">My Policies</a>
                <a href="#" onclick="alert('Coming soon!')">Claims</a>
                <a href="#" onclick="alert('Coming soon!')">Support</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>My Policies</h1>
            <p class="subtitle">Manage your insurance policies and renewals</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" style="padding-bottom: 3rem;">
        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Active Policies</div>
                <div class="stat-value" id="activePolicies">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Expiring Soon</div>
                <div class="stat-value" id="expiringSoon">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Coverage</div>
                <div class="stat-value" id="totalCoverage">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending Renewal</div>
                <div class="stat-value" id="pendingRenewal">0</div>
            </div>
        </div>

        <!-- Policies List -->
        <div class="policies-grid" id="policiesGrid">
            <!-- Policies will be loaded here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin: 0 auto;">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">No Policies Found</h2>
            <p style="color: #6b7280; margin-bottom: 2rem;">You don't have any active insurance policies yet.</p>
            <button class="btn-primary" onclick="window.location.href='calculator-health.html'" style="width: auto; padding: 0.875rem 2rem;">
                Get Insured Now
            </button>
        </div>
    </div>

    <script src="my-policies.js"></script>
</body>
</html>
