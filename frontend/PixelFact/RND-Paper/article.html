<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - PixelFact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Noto+Serif+Devanagari:wght@300;400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0A0A0A;
            --white: #FFFFFF;
            --gray-50: #FAFAFA;
            --gray-100: #F5F5F5;
            --gray-200: #E8E8E8;
            --gray-300: #D1D1D1;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            color: var(--black);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body.large-text .article-content {
            font-size: 1.3rem !important;
            line-height: 2.0 !important;
        }

        body.large-text .article-content.hindi {
            font-size: 1.45rem !important;
            line-height: 2.2 !important;
        }

        body.small-text .article-content {
            font-size: 0.95rem !important;
            line-height: 1.7 !important;
        }

        body.small-text .article-content.hindi {
            font-size: 1.1rem !important;
            line-height: 1.85 !important;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            z-index: 1000;
            padding: 20px 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--black);
            text-decoration: none;
        }

        .nav-back {
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Reading Progress Bar */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: var(--black);
            z-index: 10000;
            transition: width 0.1s ease;
        }

        .read-aloud-btn {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .read-aloud-btn:hover {
            background: var(--gray-800);
        }

        .read-aloud-btn.playing {
            background: var(--gray-700);
        }

        .read-aloud-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Reading Progress Bar */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: var(--black);
            z-index: 10001;
            transition: width 0.1s ease;
        }

        /* Font Size Controls */
        .font-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .font-btn {
            background: var(--white);
            border: 2px solid var(--black);
            color: var(--black);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .font-btn:hover {
            background: var(--black);
            color: var(--white);
        }

        .font-label {
            font-size: 0.85rem;
            color: var(--gray-600);
            font-weight: 600;
        }

        .font-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .font-btn {
            background: var(--white);
            border: 2px solid var(--black);
            color: var(--black);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .font-btn:hover {
            background: var(--black);
            color: var(--white);
        }

        /* Article Container */
        .article-container {
            max-width: 900px;
            margin: 100px auto 0;
            padding: 60px 40px;
        }

        .article-category {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray-500);
            margin-bottom: 20px;
            display: inline-block;
            border-left: 3px solid var(--black);
            padding-left: 12px;
        }

        .article-headline {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        .article-headline[lang="hi"] {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: 4.5rem;
            line-height: 1.35;
        }

        .article-meta {
            font-size: 0.9rem;
            color: var(--gray-600);
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reading-time {
            color: var(--gray-700);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .article-image {
            width: 100%;
            max-height: 600px;
            object-fit: cover;
            margin-bottom: 50px;
        }

        .article-content {
            font-size: 1.1rem;
            line-height: 1.85;
            color: var(--gray-800);
        }

        .article-content[lang="hi"] {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: 1.25rem;
            line-height: 2;
        }

        .article-content p {
            margin-bottom: 1.8em;
            text-align: justify;
            text-justify: inter-word;
            hyphens: auto;
        }

        .article-content p:first-of-type {
            margin-top: 0;
        }

        .article-content p:first-of-type::first-letter {
            font-size: 5rem;
            font-weight: 900;
            float: left;
            line-height: 0.8;
            margin: 5px 15px 0 0;
            font-family: 'Playfair Display', serif;
            color: var(--black);
        }

        .article-content strong {
            font-weight: 700;
            color: var(--black);
        }

        .article-content em {
            font-style: italic;
            color: var(--gray-700);
        }

        /* Pull quotes for emphasis */
        .article-content blockquote {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            line-height: 1.6;
            margin: 50px 0;
            padding: 30px 40px;
            border-left: 4px solid var(--black);
            background: var(--gray-50);
            font-style: italic;
        }

        .inline-image-container {
            margin: 40px 0;
        }

        .inline-image-container.portrait {
            float: right;
            width: 45%;
            margin-left: 30px;
        }

        .inline-image {
            width: 100%;
            height: auto;
        }

        .inline-image-caption {
            font-size: 0.85rem;
            color: var(--gray-600);
            font-style: italic;
            margin-top: 10px;
        }

        /* Related Articles */
        .related {
            max-width: 1400px;
            margin: 100px auto 0;
            padding: 80px 40px;
            background: var(--gray-50);
        }

        .related-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 50px;
            text-align: center;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .related-card {
            text-decoration: none;
            color: var(--black);
            display: block;
            background: var(--white);
            transition: transform 0.4s ease;
        }

        .related-card:hover {
            transform: translateY(-5px);
        }

        .related-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .related-content {
            padding: 25px;
        }

        .related-category {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray-500);
            margin-bottom: 12px;
        }

        .related-headline {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.3;
        }

        /* Footer */
        .footer {
            background: var(--black);
            color: var(--white);
            padding: 60px 40px;
            text-align: center;
        }

        .footer-text {
            font-size: 0.9rem;
            color: var(--gray-500);
        }

        @media (max-width: 768px) {
            .article-headline {
                font-size: 2.5rem;
            }

            .article-headline[lang="hi"] {
                font-size: 3rem;
            }

            .related-grid {
                grid-template-columns: 1fr;
            }

            .inline-image-container.portrait {
                float: none;
                width: 100%;
                margin-left: 0;
            }

            .nav-actions {
                flex-direction: column;
                gap: 10px;
            }

            .font-controls {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Reading Progress Bar -->
    <div class="reading-progress" id="readingProgress"></div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="landing.html" class="logo">PixelFact</a>
            <div class="nav-actions">
                <div class="font-controls">
                    <span class="font-label">Font Size:</span>
                    <button class="font-btn" id="fontDecrease" title="Decrease font size">A-</button>
                    <button class="font-btn" id="fontIncrease" title="Increase font size">A+</button>
                </div>
                <button class="read-aloud-btn" id="readAloudBtn">
                    <i data-feather="volume-2"></i>
                    <span id="readAloudText">Read Aloud</span>
                </button>
                <a href="landing.html" class="nav-back">
                    <i data-feather="arrow-left"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </nav>

    <!-- Article Content -->
    <article class="article-container" id="article-content">
        <!-- Article will be loaded here -->
    </article>

    <!-- Related Articles -->
    <section class="related">
        <h2 class="related-title">Continue Reading</h2>
        <div class="related-grid" id="related-articles">
            <!-- Related articles will be loaded here -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">2024 © PIXELFACT</p>
        </div>
    </footer>

    <script>
        let magazineData = null;
        let currentArticle = null;

        // Get article ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get('id'));

        // Load magazine data
        async function loadMagazine() {
            try {
                const response = await fetch('magazine_articles.json');
                magazineData = await response.json();
                loadArticle();
                loadRelated();
            } catch (error) {
                console.error('Error loading magazine:', error);
            }
        }

        // Load article
        function loadArticle() {
            if (!magazineData) return;

            currentArticle = magazineData.articles.find(a => a.id === articleId);
            if (!currentArticle) {
                window.location.href = 'landing.html';
                return;
            }

            const container = document.getElementById('article-content');
            
            // Build inline images HTML
            let inlineImagesHTML = '';
            if (currentArticle.inline_images && currentArticle.inline_images.length > 0) {
                inlineImagesHTML = currentArticle.inline_images.map((img, idx) => `
                    <div class="inline-image-container ${img.type}">
                        <img src="${img.path}" alt="Figure ${idx + 1}" class="inline-image">
                        <div class="inline-image-caption">Figure ${idx + 1}</div>
                    </div>
                `).join('');
            }

            // Convert content to paragraphs
            const paragraphs = currentArticle.content.split('\n\n').filter(p => p.trim());
            const contentHTML = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');

            // Calculate reading time (avg 200 words per minute)
            const readingTime = Math.ceil(currentArticle.word_count / 200);

            container.innerHTML = `
                <div class="article-category">${currentArticle.category} • Page ${currentArticle.page}</div>
                <h1 class="article-headline" ${currentArticle.language === 'Hindi' ? 'lang="hi"' : ''}>${currentArticle.headline}</h1>
                <div class="article-meta">
                    <span class="meta-item">
                        <i data-feather="globe"></i>
                        ${currentArticle.language}
                    </span>
                    <span class="meta-item">
                        <i data-feather="file-text"></i>
                        ${currentArticle.word_count} words
                    </span>
                    <span class="reading-time">
                        <i data-feather="clock"></i>
                        ${readingTime} min read
                    </span>
                    <span class="meta-item">
                        <i data-feather="calendar"></i>
                        Issue 4, December 2024
                    </span>
                </div>
                ${currentArticle.inline_images && currentArticle.inline_images.length > 0 ? 
                    `<img src="${currentArticle.inline_images[0].path}" alt="${currentArticle.headline}" class="article-image">` :
                    `<img src="${currentArticle.image}" alt="${currentArticle.headline}" class="article-image">`
                }
                <div class="article-content" ${currentArticle.language === 'Hindi' ? 'lang="hi"' : ''}>
                    ${inlineImagesHTML}
                    ${contentHTML}
                </div>
            `;

            // Update page title
            document.title = `${currentArticle.headline} - PixelFact`;
        }

        // Load related articles
        function loadRelated() {
            if (!magazineData || !currentArticle) return;

            // Get other articles (exclude current)
            const related = magazineData.articles
                .filter(a => a.id !== articleId)
                .slice(0, 3);

            const container = document.getElementById('related-articles');
            container.innerHTML = related.map(article => `
                <a href="article.html?id=${article.id}" class="related-card">
                    <img src="${article.inline_images && article.inline_images.length > 0 ? article.inline_images[0].path : article.image}" 
                         alt="${article.headline}" class="related-image">
                    <div class="related-content">
                        <div class="related-category">${article.category}</div>
                        <h3 class="related-headline">${article.headline}</h3>
                    </div>
                </a>
            `).join('');
        }

        // Load on page load
        loadMagazine();

        // Text-to-Speech functionality
        let speechSynth = window.speechSynthesis;
        let utterance = null;
        let isPlaying = false;

        const readAloudBtn = document.getElementById('readAloudBtn');
        const readAloudText = document.getElementById('readAloudText');

        readAloudBtn.addEventListener('click', function() {
            if (isPlaying) {
                // Stop reading
                speechSynth.cancel();
                isPlaying = false;
                readAloudBtn.classList.remove('playing');
                readAloudText.textContent = 'Read Aloud';
                readAloudBtn.querySelector('i').setAttribute('data-feather', 'volume-2');
                feather.replace();
            } else {
                // Start reading
                if (!currentArticle) return;

                // Get article text content
                const textToRead = currentArticle.headline + '. ' + currentArticle.content;

                utterance = new SpeechSynthesisUtterance(textToRead);
                
                // Configure voice settings for deep Indian-sounding voice
                utterance.rate = 0.85; // Slightly slower for dramatic effect
                utterance.pitch = 0.7; // Lower pitch for deep voice
                utterance.volume = 1.0;
                
                // Try to find an Indian English voice
                const voices = speechSynth.getVoices();
                const indianVoice = voices.find(voice => 
                    voice.lang.includes('en-IN') || 
                    voice.name.includes('India') ||
                    voice.name.includes('Rishi') ||
                    voice.name.includes('Veena')
                );
                
                if (indianVoice) {
                    utterance.voice = indianVoice;
                } else {
                    // Fallback to any English voice with lower pitch
                    const englishVoice = voices.find(voice => voice.lang.startsWith('en'));
                    if (englishVoice) utterance.voice = englishVoice;
                }

                // Event handlers
                utterance.onstart = function() {
                    isPlaying = true;
                    readAloudBtn.classList.add('playing');
                    readAloudText.textContent = 'Pause';
                    readAloudBtn.querySelector('i').setAttribute('data-feather', 'pause');
                    feather.replace();
                };

                utterance.onend = function() {
                    isPlaying = false;
                    readAloudBtn.classList.remove('playing');
                    readAloudText.textContent = 'Read Aloud';
                    readAloudBtn.querySelector('i').setAttribute('data-feather', 'volume-2');
                    feather.replace();
                };

                utterance.onerror = function(event) {
                    console.error('Speech synthesis error:', event);
                    isPlaying = false;
                    readAloudBtn.classList.remove('playing');
                    readAloudText.textContent = 'Read Aloud';
                    readAloudBtn.querySelector('i').setAttribute('data-feather', 'volume-2');
                    feather.replace();
                };

                speechSynth.speak(utterance);
            }
        });

        // Load voices when they are loaded (needed for some browsers)
        if (speechSynth.onvoiceschanged !== undefined) {
            speechSynth.onvoiceschanged = function() {
                speechSynth.getVoices();
            };
        }

        // Font Size Controls
        const fontIncreaseBtn = document.getElementById('fontIncrease');
        const fontDecreaseBtn = document.getElementById('fontDecrease');

        fontIncreaseBtn.addEventListener('click', function() {
            document.body.classList.remove('small-text');
            document.body.classList.add('large-text');
        });

        fontDecreaseBtn.addEventListener('click', function() {
            document.body.classList.remove('large-text');
            document.body.classList.add('small-text');
        });

        // Reading Progress Bar
        const progressBar = document.getElementById('readingProgress');

        window.addEventListener('scroll', function() {
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            const scrollPercent = (scrollTop / (documentHeight - windowHeight)) * 100;
            progressBar.style.width = scrollPercent + '%';
        });

        // Smooth scroll to top on page load
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // Initialize feather icons
        feather.replace();
    </script>
</body>
</html>
