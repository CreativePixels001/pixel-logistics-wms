<svg width="64" height="128" viewBox="0 0 64 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Truck container (top view) -->
  <rect x="12" y="10" width="40" height="70" fill="#E8E8E8" stroke="#2C2C2C" stroke-width="2"/>
  
  <!-- Truck cabin -->
  <rect x="16" y="82" width="32" height="36" rx="2" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="2"/>
  
  <!-- Cabin windows -->
  <rect x="20" y="86" width="10" height="8" fill="#5A5A5A" opacity="0.6"/>
  <rect x="34" y="86" width="10" height="8" fill="#5A5A5A" opacity="0.6"/>
  
  <!-- Front bumper -->
  <rect x="18" y="118" width="28" height="4" fill="#2C2C2C"/>
  
  <!-- Side mirrors -->
  <rect x="10" y="88" width="4" height="6" fill="#5A5A5A"/>
  <rect x="50" y="88" width="4" height="6" fill="#5A5A5A"/>
  
  <!-- Container details -->
  <line x1="32" y1="15" x2="32" y2="75" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="16" y="25" width="32" height="3" fill="#5A5A5A" opacity="0.3"/>
  <rect x="16" y="45" width="32" height="3" fill="#5A5A5A" opacity="0.3"/>
  <rect x="16" y="65" width="32" height="3" fill="#5A5A5A" opacity="0.3"/>
</svg>