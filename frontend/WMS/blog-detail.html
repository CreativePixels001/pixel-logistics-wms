            }
        };

        // Get blog ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('id') || '1';

        // Audio Player State
        let audioPlaying = false;
        let speechSynthesis = window.speechSynthesis;
        let utterance = null;
        let currentCharIndex = 0;

        // Get animated icon HTML
        function getAnimatedIcon(iconType) {
            const icons = {
                robot: `
                    <div class="icon-robot">
                        <div class="icon-robot-antenna"></div>
                        <div class="icon-robot-head">
                            <div class="icon-robot-eyes">
                                <div class="icon-robot-eye"></div>
                                <div class="icon-robot-eye"></div>
                            </div>
                        </div>
                        <div class="icon-robot-body"></div>
                    </div>
                `,
                truck: `
                    <div class="icon-truck">
                        <div class="icon-truck-cabin"></div>
                        <div class="icon-truck-cargo"></div>
                        <div class="icon-truck-wheels">
                            <div class="icon-truck-wheel"></div>
                            <div class="icon-truck-wheel"></div>
                        </div>
                    </div>
                `,
                chart: `
                    <div class="icon-chart">
                        <div class="icon-chart-bars">
                            <div class="icon-chart-bar"></div>
                            <div class="icon-chart-bar"></div>
                            <div class="icon-chart-bar"></div>
                            <div class="icon-chart-bar"></div>
                        </div>
                    </div>
                `
            };
            return icons[iconType] || icons.robot;
        }

        // Load blog content
        function loadBlog() {
            const blog = blogData[blogId];
            if (!blog) {
                document.getElementById('articleContent').innerHTML = '<h1>Blog post not found</h1>';
                return;
            }

            document.getElementById('blogTitle').textContent = blog.title + ' - Pixel Logistics';
            
            document.getElementById('articleContent').innerHTML = `
                <div class="article-header">
                    <span class="article-category">${blog.category}</span>
                    <h1 class="article-title">${blog.title}</h1>
                    <div class="article-meta">
                        <div class="author-section">
                            <div class="author-avatar">${blog.author.charAt(0)}</div>
                            <div class="author-info">
                                <div class="author-name">${blog.author}</div>
                                <div class="article-date">${blog.date}</div>
                            </div>
                        </div>
                        <div class="read-time">${blog.readTime}</div>
                    </div>
                </div>

                <!-- Audio Player -->
                <div class="audio-player">
                    <div class="audio-controls">
                        <button class="play-btn" onclick="toggleAudio()" id="playBtn"></button>
                    </div>
                    <div class="audio-info">
                        <div class="audio-title">Listen to this article</div>
                        <div class="audio-progress" onclick="seekAudio(event)">
                            <div class="audio-progress-bar" id="progressBar"></div>
                        </div>
                        <div class="audio-time">
                            <span id="currentTime">0:00</span>
                            <span id="totalTime">--:--</span>
                        </div>
                    </div>
                    <div class="speed-control">
                        <button class="speed-btn active" onclick="setSpeed(1)" data-speed="1">1x</button>
                        <button class="speed-btn" onclick="setSpeed(1.25)" data-speed="1.25">1.25x</button>
                        <button class="speed-btn" onclick="setSpeed(1.5)" data-speed="1.5">1.5x</button>
                    </div>
                </div>

                <div class="article-image">
                    <img src="${blog.image}" alt="${blog.title}" loading="lazy">
                </div>

                <div class="article-content" id="articleText">
                    ${blog.content}
                </div>

                <div class="article-footer">
                    <div class="share-section">
                        <h3>Share this article</h3>
                        <div class="share-buttons">
                            <button class="share-btn" onclick="shareArticle('twitter')">Share on Twitter</button>
                            <button class="share-btn" onclick="shareArticle('linkedin')">Share on LinkedIn</button>
                            <button class="share-btn" onclick="shareArticle('email')">Email</button>
                        </div>
                    </div>

                    <div class="related-posts">
                        <h3>Related Articles</h3>
                        <div class="related-grid">
                            ${getRelatedPosts(blogId)}
                        </div>
                    </div>
                </div>
            `;

            // Initialize audio
            initializeAudio(blog);
        }

        // Audio Player Functions
        function initializeAudio(blog) {
            // Get article text content
            const articleEl = document.getElementById('articleText');
            const textContent = blog.title + '. ' + articleEl.innerText;
            
            // Create speech synthesis utterance
            utterance = new SpeechSynthesisUtterance(textContent);
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;

            // Calculate approximate duration (words per minute)
            const wordCount = textContent.split(' ').length;
            const estimatedMinutes = Math.ceil(wordCount / 150); // Average reading speed
            document.getElementById('totalTime').textContent = estimatedMinutes + ':00';

            utterance.onend = function() {
                audioPlaying = false;
                document.getElementById('playBtn').classList.remove('playing');
                document.getElementById('progressBar').style.width = '0%';
            };

            utterance.onboundary = function(event) {
                if (event.name === 'word') {
                    currentCharIndex = event.charIndex;
                    const progress = (currentCharIndex / textContent.length) * 100;
                    document.getElementById('progressBar').style.width = progress + '%';
                    
                    const elapsed = Math.floor((currentCharIndex / textContent.length) * estimatedMinutes * 60);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    document.getElementById('currentTime').textContent = 
                        minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                }
            };
        }

        function toggleAudio() {
            const playBtn = document.getElementById('playBtn');
            
            if (audioPlaying) {
                speechSynthesis.cancel();
                audioPlaying = false;
                playBtn.classList.remove('playing');
            } else {
                speechSynthesis.speak(utterance);
                audioPlaying = true;
                playBtn.classList.add('playing');
            }
        }

        function setSpeed(speed) {
            // Update active button
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseFloat(btn.dataset.speed) === speed) {
                    btn.classList.add('active');
                }
            });

            // Update utterance speed
            if (utterance) {
                utterance.rate = speed;
                
                // Restart if playing
                if (audioPlaying) {
                    speechSynthesis.cancel();
                    speechSynthesis.speak(utterance);
                }
            }
        }

        function seekAudio(event) {
            const progressBar = event.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percentage = (clickX / rect.width) * 100;
            
            document.getElementById('progressBar').style.width = percentage + '%';
            
            // Note: Web Speech API doesn't support seeking, so we restart from beginning
            // In a real implementation, you'd use Web Audio API with actual audio files
            if (audioPlaying) {
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
            }
        }

        function getRelatedPosts(currentId) {
            const allIds = Object.keys(blogData).filter(id => id !== currentId);
            const relatedIds = allIds.slice(0, 3);
            
            return relatedIds.map(id => {
                const blog = blogData[id];
                return `
                    <div class="related-card" onclick="window.location.href='blog-detail.html?id=${id}'">
                        <h4>${blog.title}</h4>
                        <p>${blog.date} • ${blog.readTime}</p>
                    </div>
                `;
            }).join('');
        }

        function shareArticle(platform) {
            const url = window.location.href;
            const blog = blogData[blogId];
            const text = blog.title;

            switch(platform) {
                case 'twitter':
                    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`);
                    break;
                case 'linkedin':
                    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`);
                    break;
                case 'email':
                    window.location.href = `mailto:?subject=${encodeURIComponent(text)}&body=${encodeURIComponent(url)}`;
                    break;
            }
        }

        // Load blog on page load
        loadBlog();
    </script>
</body>
</html>
