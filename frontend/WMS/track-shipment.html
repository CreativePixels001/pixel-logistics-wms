<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Shipment - Pixel Logistics</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/notifications.css">
  <link rel="stylesheet" href="../css/track-shipment.css">
</head>
<body>
  
  <!-- Close Button -->
  <button class="tracking-close-btn" onclick="window.location.href='index.html'" title="Close and return to dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <!-- Search Button -->
  <button class="tracking-search-btn" onclick="openTrackingSearch()" title="Search shipments (⌘K)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <span class="search-kbd">⌘K</span>
  </button>

  <!-- Search Modal -->
  <div class="tracking-search-modal" id="trackingSearchModal" style="display: none;">
    <div class="tracking-search-overlay" onclick="closeTrackingSearch()"></div>
    <div class="tracking-search-content">
      <div class="tracking-search-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" class="tracking-search-input" id="trackingSearchInput" placeholder="Search shipments by ID, customer, location..." autocomplete="off" autofocus>
        <button class="tracking-search-close" onclick="closeTrackingSearch()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="tracking-search-results" id="trackingSearchResults">
        <div class="search-hint">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <p>Start typing to search shipments...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="tracking-fullscreen-container">

      <!-- Tracking Container -->
      <div class="tracking-container">
        <!-- Left Panel - Order List -->
        <div class="orders-panel">
          <div class="panel-header">
            <h3>Active Shipments</h3>
            <span class="shipment-count" id="shipmentCount">0</span>
          </div>
          <div class="orders-list" id="ordersList">
            <!-- Order cards will be dynamically inserted here -->
          </div>
        </div>

        <!-- Right Panel - Map -->
        <div class="map-panel">
          <div id="map"></div>
          <div class="map-controls">
            <button class="map-control-btn" onclick="centerMap()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </button>
            <button class="map-control-btn" onclick="toggleTraffic()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Side Panel for Order Details -->
  <div class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <h3>Shipment Details</h3>
      <button class="close-panel" onclick="closeSidePanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="side-panel-content" id="sidePanelContent">
      <!-- Details will be dynamically inserted here -->
    </div>
  </div>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/track-shipment-leaflet.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    // Search Modal Functions
    function openTrackingSearch() {
      const modal = document.getElementById('trackingSearchModal');
      const input = document.getElementById('trackingSearchInput');
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      setTimeout(() => input.focus(), 100);
    }

    function closeTrackingSearch() {
      const modal = document.getElementById('trackingSearchModal');
      const input = document.getElementById('trackingSearchInput');
      const results = document.getElementById('trackingSearchResults');
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
      input.value = '';
      results.innerHTML = `
        <div class="search-hint">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <p>Start typing to search shipments...</p>
        </div>
      `;
    }

    // CMD+K keyboard shortcut
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        openTrackingSearch();
      }
      if (e.key === 'Escape') {
        closeTrackingSearch();
      }
    });

    // Search functionality
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('trackingSearchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase().trim();
          const resultsContainer = document.getElementById('trackingSearchResults');
          
          if (!query) {
            resultsContainer.innerHTML = `
              <div class="search-hint">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.35-4.35"></path>
                </svg>
                <p>Start typing to search shipments...</p>
              </div>
            `;
            return;
          }

          // Search through shipments
          const filtered = window.shipments.filter(s => 
            s.id.toLowerCase().includes(query) ||
            s.customer.toLowerCase().includes(query) ||
            s.origin.toLowerCase().includes(query) ||
            s.destination.toLowerCase().includes(query) ||
            s.driver.toLowerCase().includes(query) ||
            s.vehicle.toLowerCase().includes(query) ||
            s.status.toLowerCase().includes(query)
          );

          if (filtered.length === 0) {
            resultsContainer.innerHTML = `
              <div class="search-hint">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <p>No shipments found for "${query}"</p>
              </div>
            `;
            return;
          }

          // Display results
          resultsContainer.innerHTML = filtered.map(shipment => `
            <div class="search-result-item" onclick="selectSearchResult('${shipment.id}')">
              <div class="search-result-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="1" y="3" width="15" height="13"></rect>
                  <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                  <circle cx="5.5" cy="18.5" r="2.5"></circle>
                  <circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>
              </div>
              <div class="search-result-content">
                <div class="search-result-title">${shipment.id} - ${shipment.customer}</div>
                <div class="search-result-subtitle">${shipment.origin} → ${shipment.destination}</div>
              </div>
              <div class="search-result-badge status-${shipment.status.toLowerCase().replace(' ', '-')}">${shipment.status}</div>
            </div>
          `).join('');
        });
      }
    });

    function selectSearchResult(shipmentId) {
      closeTrackingSearch();
      selectOrder(shipmentId);
    }
  </script>
</body>
</html>
