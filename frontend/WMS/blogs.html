<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Pixel Logistics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #000000;
            --color-secondary: #1a1a1a;
            --color-grey-dark: #4a4a4a;
            --color-grey: #6b6b6b;
            --color-grey-light: #9b9b9b;
            --color-grey-lighter: #d1d1d1;
            --color-background: #f5f5f5;
            --color-white: #ffffff;
            --transition: 0.3s ease;
        }

        /* Animated Icons */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .icon-small {
            width: 60px;
            height: 60px;
            position: relative;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        /* Robot Icon */
        .icon-robot-head-small {
            width: 35px;
            height: 28px;
            border: 2.5px solid var(--color-primary);
            position: absolute;
            top: 8px;
            left: 12.5px;
            border-radius: 6px;
        }

        .icon-robot-antenna-small {
            width: 2.5px;
            height: 10px;
            background: var(--color-primary);
            position: absolute;
            top: -10px;
            left: 15px;
        }

        .icon-robot-antenna-small::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--color-primary);
            border-radius: 50%;
            position: absolute;
            top: -6px;
            left: -1.75px;
            animation: pulse 2s ease-in-out infinite;
        }

        .icon-robot-eyes-small {
            display: flex;
            gap: 12px;
            position: absolute;
            top: 13px;
            left: 17px;
        }

        .icon-robot-eye-small {
            width: 6px;
            height: 6px;
            background: var(--color-primary);
            border-radius: 50%;
        }

        .icon-robot-body-small {
            width: 28px;
            height: 20px;
            border: 2.5px solid var(--color-primary);
            position: absolute;
            top: 36px;
            left: 16px;
            border-radius: 4px;
        }

        /* Truck Icon */
        .icon-truck-cabin-small {
            width: 18px;
            height: 22px;
            border: 2.5px solid var(--color-primary);
            position: absolute;
            top: 18px;
            left: 8px;
            border-radius: 4px 4px 0 0;
        }

        .icon-truck-cargo-small {
            width: 28px;
            height: 18px;
            border: 2.5px solid var(--color-primary);
            position: absolute;
            top: 22px;
            left: 26px;
        }

        .icon-truck-wheels-small {
            display: flex;
            gap: 24px;
            position: absolute;
            top: 42px;
            left: 12px;
        }

        .icon-truck-wheel-small {
            width: 10px;
            height: 10px;
            border: 2.5px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        /* Chart Icon */
        .icon-chart-bars-small {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            gap: 6px;
            align-items: flex-end;
        }

        .icon-chart-bar-small {
            width: 9px;
            background: var(--color-primary);
            border-radius: 3px 3px 0 0;
        }

        .icon-chart-bar-small:nth-child(1) {
            height: 18px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .icon-chart-bar-small:nth-child(2) {
            height: 30px;
            animation: pulse 1.5s ease-in-out infinite 0.2s;
        }

        .icon-chart-bar-small:nth-child(3) {
            height: 22px;
            animation: pulse 1.5s ease-in-out infinite 0.4s;
        }

        .icon-chart-bar-small:nth-child(4) {
            height: 34px;
            animation: pulse 1.5s ease-in-out infinite 0.6s;
        }

        /* Database Icon */
        .icon-db-small {
            position: relative;
        }

        .icon-db-disk {
            width: 34px;
            height: 9px;
            border: 2.5px solid var(--color-primary);
            border-radius: 50%;
            position: absolute;
            background: var(--color-white);
        }

        .icon-db-disk:nth-child(1) {
            top: 12px;
            left: 13px;
        }

        .icon-db-disk:nth-child(2) {
            top: 26px;
            left: 13px;
        }

        .icon-db-disk:nth-child(3) {
            top: 40px;
            left: 13px;
        }

        .icon-db-line {
            width: 2.5px;
            height: 28px;
            background: var(--color-primary);
            position: absolute;
            top: 15px;
        }

        .icon-db-line:nth-child(4) {
            left: 13px;
        }

        .icon-db-line:nth-child(5) {
            left: 44.5px;
        }

        /* Lightbulb Icon */
        .icon-bulb-small {
            position: relative;
        }

        .icon-bulb-top {
            width: 24px;
            height: 24px;
            border: 2.5px solid var(--color-primary);
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            top: 10px;
            left: 18px;
            animation: pulse 3s ease-in-out infinite;
        }

        .icon-bulb-base {
            width: 14px;
            height: 10px;
            border: 2.5px solid var(--color-primary);
            position: absolute;
            top: 34px;
            left: 23px;
            border-radius: 0 0 4px 4px;
        }

        .icon-bulb-screw {
            width: 12px;
            height: 2px;
            background: var(--color-primary);
            position: absolute;
            left: 24px;
        }

        .icon-bulb-screw:nth-child(3) {
            top: 36px;
        }

        .icon-bulb-screw:nth-child(4) {
            top: 40px;
        }

        /* Target Icon */
        .icon-target-small {
            position: relative;
        }

        .icon-target-circle {
            border: 2.5px solid var(--color-primary);
            border-radius: 50%;
            position: absolute;
        }

        .icon-target-circle:nth-child(1) {
            width: 40px;
            height: 40px;
            top: 10px;
            left: 10px;
        }

        .icon-target-circle:nth-child(2) {
            width: 28px;
            height: 28px;
            top: 16px;
            left: 16px;
        }

        .icon-target-circle:nth-child(3) {
            width: 16px;
            height: 16px;
            top: 22px;
            left: 22px;
            background: var(--color-primary);
            animation: pulse 2s ease-in-out infinite;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--color-secondary);
            background: var(--color-white);
        }

        /* Navbar */
        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-grey-lighter);
            padding: 1.5rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--color-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-back {
            padding: 10px 24px;
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .nav-back:hover {
            background: var(--color-secondary);
        }

        /* Hero Section */
        .blog-hero {
            padding: 120px 2rem 60px;
            background: var(--color-primary);
            color: var(--color-white);
            text-align: center;
        }

        .blog-hero h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .blog-hero p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Blog Grid */
        .blog-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 2rem;
        }

        .blog-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            background: var(--color-white);
            border: 2px solid var(--color-grey-lighter);
            color: var(--color-grey-dark);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--color-primary);
            color: var(--color-white);
            border-color: var(--color-primary);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
        }

        .blog-card {
            background: var(--color-white);
            border: 2px solid var(--color-grey-lighter);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        .blog-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(-5px);
        }

        .blog-image {
            width: 100%;
            height: 200px;
            background: var(--color-background);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--color-grey-lighter);
            transition: 0.3s ease;
            overflow: hidden;
        }

        .blog-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.3s ease;
        }

        .blog-card:hover .blog-image img {
            transform: scale(1.05);
            filter: grayscale(80%);
        }

        .blog-content {
            padding: 30px;
        }

        .blog-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 13px;
            color: var(--color-grey);
        }

        .blog-category {
            display: inline-block;
            padding: 4px 12px;
            background: var(--color-primary);
            color: var(--color-white);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .blog-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .blog-card h3 {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .blog-excerpt {
            color: var(--color-grey-dark);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .blog-author {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--color-grey-lighter);
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            background: var(--color-primary);
            color: var(--color-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .author-info {
            flex: 1;
        }

        .author-name {
            font-weight: 600;
            color: var(--color-primary);
        }

        .read-time {
            color: var(--color-grey);
            font-size: 13px;
        }

        /* Footer */
        .footer {
            background: var(--color-primary);
            color: var(--color-white);
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
        }

        @media (max-width: 768px) {
            .blog-hero h1 {
                font-size: 36px;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }

            .blog-filters {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->

            }

        let currentFilter = 'all';

        // Get animated icon HTML
        function getAnimatedIcon(iconType) {
            const icons = {
                robot: `
                    <div class="icon-small">
                        <div class="icon-robot-antenna-small"></div>
                        <div class="icon-robot-head-small">
                            <div class="icon-robot-eyes-small">
                                <div class="icon-robot-eye-small"></div>
                                <div class="icon-robot-eye-small"></div>
                            </div>
                        </div>
                        <div class="icon-robot-body-small"></div>
                    </div>
                `,
                truck: `
                    <div class="icon-small">
                        <div class="icon-truck-cabin-small"></div>
                        <div class="icon-truck-cargo-small"></div>

                `,
                chart: `
                    <div class="icon-small">
                        <div class="icon-chart-bars-small">
                            <div class="icon-chart-bar-small"></div>
                            <div class="icon-chart-bar-small"></div>

                `,
                database: `
                    <div class="icon-small icon-db-small">
                        <div class="icon-db-disk"></div>
                        <div class="icon-db-disk"></div>
                        <div class="icon-db-disk"></div>
                        <div class="icon-db-line"></div>
                        <div class="icon-db-line"></div>
                    </div>
                `,
                bulb: `
                    <div class="icon-small icon-bulb-small">
                        <div class="icon-bulb-top"></div>
                        <div class="icon-bulb-base"></div>
                        <div class="icon-bulb-screw"></div>
                        <div class="icon-bulb-screw"></div>
                    </div>
                `,
                target: `
                    <div class="icon-small icon-target-small">
                        <div class="icon-target-circle"></div>
                        <div class="icon-target-circle"></div>
                        <div class="icon-target-circle"></div>
                    </div>
                `
            };
            return icons[iconType] || icons.robot;
        }

        function renderBlogs() {
            const grid = document.getElementById('blogGrid');
            const filteredBlogs = currentFilter === 'all' 
                ? blogs 
                : blogs.filter(blog => blog.category === currentFilter);

            grid.innerHTML = filteredBlogs.map(blog => `
                <div class="blog-card" onclick="openBlog(${blog.id})">
                    <div class="blog-image">
                        <img src="${blog.image}" alt="${blog.title}" loading="lazy">
                    </div>
                    <div class="blog-content">
                        <div class="blog-meta">
                            <span class="blog-category">${blog.categoryLabel}</span>
                            <span class="blog-date">${blog.date}</span>
                        </div>
                        <h3>${blog.title}</h3>
                        <p class="blog-excerpt">${blog.excerpt}</p>
                        <div class="blog-author">
                            <div class="author-avatar">${blog.author.charAt(0)}</div>
                            <div class="author-info">
                                <div class="author-name">${blog.author}</div>
                                <div class="read-time">${blog.readTime}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterBlogs(category) {
            currentFilter = category;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderBlogs();
        }

        function openBlog(id) {
            window.location.href = `blog-detail.html?id=${id}`;
        }

        // Initial render
        renderBlogs();
    </script>
</body>
