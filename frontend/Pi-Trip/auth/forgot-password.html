<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Pi-Trip</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <!-- Simple Header -->
    <header class="auth-header">
        <div class="container">
            <a href="../index.html" class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span>Pi-Trip</span>
            </a>
        </div>
    </header>

    <!-- Reset Password Container -->
    <main class="auth-container">
        <div class="auth-box auth-box-centered">
            <div class="auth-content">
                <div class="auth-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>

                <div class="auth-welcome">
                    <h1>Forgot Password?</h1>
                    <p>Koi nahi! Password reset link bhej denge aapke email pe 📧</p>
                </div>

                <!-- Reset Form -->
                <form class="auth-form" id="resetForm" onsubmit="handlePasswordReset(event)">
                    <div class="form-group">
                        <label for="email">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                            Registered Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="rider@pitrip.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <button type="submit" class="btn-primary btn-full">
                        Send Reset Link
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </form>

                <!-- Success Message (Hidden by default) -->
                <div class="success-message" id="successMessage" style="display: none;">
                    <div class="success-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    <h3>Email Sent Successfully!</h3>
                    <p>Password reset link has been sent to your email. Please check your inbox (and spam folder too!).</p>
                    <p class="timer">Redirecting to login in <span id="countdown">5</span> seconds...</p>
                </div>

                <!-- Back to Login -->
                <div class="auth-footer">
                    <a href="login.html" class="link-text">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"/>
                            <polyline points="12 19 5 12 12 5"/>
                        </svg>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
</body>
</html>
