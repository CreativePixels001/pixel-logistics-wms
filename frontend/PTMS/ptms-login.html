<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pixel Transport</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        :root {
            --ptms-primary: #10b981;
            --ptms-dark: #059669;
        }
        .btn-primary { background: var(--ptms-primary); }
        .btn-primary:hover { background: var(--ptms-dark); }
        .login-card::before { background: linear-gradient(135deg, var(--ptms-primary), var(--ptms-dark)); }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <svg class="login-logo" viewBox="0 0 40 40" fill="none">
                    <path d="M20 8L32 20L20 32L8 20L20 8Z" fill="currentColor"/>
                    <circle cx="20" cy="20" r="4" fill="white"/>
                </svg>
                <h1>Pixel Transport</h1>
                <p>Sign in to your account</p>
            </div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary btn-full">Sign In</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="#" onclick="alert('Contact sales@pixeltransport.com')">Contact Sales</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            // Store user session
            localStorage.setItem('ptms_user', 'demo_user');
            localStorage.setItem('ptms_role', 'admin');
            // Redirect to dashboard
            window.location.href = 'ptms-dashboard.html';
        }
    </script>
</body>
</html>
