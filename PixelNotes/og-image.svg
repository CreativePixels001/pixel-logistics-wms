<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Black gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <circle cx="1100" cy="530" r="80" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  
  <!-- Logo Icon -->
  <rect x="80" y="220" width="80" height="80" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="120" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">P</text>
  
  <!-- Main Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff">PIXELNOTES</text>
  
  <!-- Subtitle -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="32" fill="#cccccc">Smart Note-Taking with AI Intelligence</text>
  
  <!-- Feature Icons -->
  <!-- Microphone Icon -->
  <g transform="translate(200, 375)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffffff" stroke-width="2"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="2"/>
  </g>
  <text x="230" y="385" font-family="Arial, sans-serif" font-size="24" fill="#999999">Voice Input</text>
  
  <!-- Calendar Icon -->
  <g transform="translate(420, 375)">
    <rect x="-10" y="-8" width="20" height="18" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
    <line x1="-6" y1="-8" x2="-6" y2="-12" stroke="#ffffff" stroke-width="2"/>
    <line x1="6" y1="-8" x2="6" y2="-12" stroke="#ffffff" stroke-width="2"/>
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#ffffff" stroke-width="1"/>
  </g>
  <text x="450" y="385" font-family="Arial, sans-serif" font-size="24" fill="#999999">Smart Timestamps</text>
  
  <!-- Image Icon -->
  <g transform="translate(720, 375)">
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="-4" cy="-3" r="2" fill="#ffffff"/>
    <polyline points="-8,8 -2,2 4,6 8,2 8,8" fill="none" stroke="#ffffff" stroke-width="2"/>
  </g>
  <text x="750" y="385" font-family="Arial, sans-serif" font-size="24" fill="#999999">Image Upload</text>
  
  <!-- AI Icon -->
  <g transform="translate(960, 375)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#ffffff"/>
    <circle cx="4" cy="-2" r="1.5" fill="#ffffff"/>
    <path d="M -4,3 Q 0,6 4,3" fill="none" stroke="#ffffff" stroke-width="2"/>
  </g>
  <text x="990" y="385" font-family="Arial, sans-serif" font-size="24" fill="#999999">AI Assistant</text>
  
  <!-- URL -->
  <text x="200" y="520" font-family="Arial, sans-serif" font-size="20" fill="#666666">creativepixels.in/Projects/Notes</text>
  
  <!-- Border -->
  <rect x="10" y="10" width="1180" height="610" rx="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
</svg>